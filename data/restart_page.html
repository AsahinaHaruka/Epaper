<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备重启中 / Restarting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .message {
            background-color: #2196F3;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 400px;
        }

        h2 {
            margin: 0 0 10px 0;
        }

        p {
            margin: 5px 0;
        }

        .spinner {
            border: 4px solid #ffffff40;
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <script>
        setTimeout(function () {
            window.close();
        }, 3000);
    </script>
</head>

<body>
    <div class="message">
        <h2>设备正在重启...</h2>
        <p>Device is Restarting...</p>
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 14px;">窗口将在3秒后自动关闭</p>
        <p style="font-size: 14px;">Window will close automatically</p>
    </div>
</body>

</html>
