; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp-wrover-kit]
platform = espressif32
board = esp32-pico-devkitm-2
framework = arduino
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 460800
upload_resetmethod = nodemcu
board_build.filesystem = littlefs

; 发布版本优化
build_flags = 
    -DENABLE_GxEPD2_GFX=0        ; 禁用GFX（不需要）
    -DGXEPD2_750c_Z08_ONLY=1     ; 只编译750c_Z08驱动
    -DU8G2_USE_LARGE_FONTS=1     ; 启用大字体（天气图标）
    -Os                           ; 优化代码大小
    -DNDEBUG                      ; 禁用 assert 等调试代码
    -DCORE_DEBUG_LEVEL=0          ; 关闭调试输出
    -DCONFIG_ARDUHAL_LOG_LEVEL=0  ; 关闭日志输出
    -ffunction-sections           ; 将每个函数放入独立section
    -fdata-sections               ; 将每个数据放入独立section
    -Wl,--gc-sections             ; 链接时删除未使用的section
    -DARDUINO_USB_CDC_ON_BOOT=0   ; 禁用USB CDC
    -UBOARD_HAS_PSRAM             ; 禁用PSRAM（避免GPIO16/17冲突）
build_unflags = 
    -O2                           ; 移除默认的O2优化
build_src_filter =
    +<*>
    -<sntp.cpp>                   ; 未使用（NTP已在main.cpp中实现）
    -<rtc_bl8025.cpp>             ; 未使用（RTC硬件未安装）
    
lib_deps = 
        tzapu/WiFiManager@^2.0.17
        bblanchon/ArduinoJson@^7.3.1
        olikraus/U8g2_for_Adafruit_GFX@^1.8.0
        adafruit/Adafruit SHT31 Library@^2.2.2
        https://github.com/JADE-Jerry/nongli.git
        https://github.com/tignioj/ArduinoUZlib
        https://github.com/yanyuandi/FastFreshBWOnColor.git

